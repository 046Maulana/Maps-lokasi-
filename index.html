<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="loading" id="loadingText">Loading...</div>

<iframe 
  src="https://script.google.com/macros/s/AKfycbyjG33YxCsM6Q56CbfONGWxHaPOo7H7LhGHqJLQWQG6_IB4DbqjTyDmX01c3Bnh1yzS/exec"
  onload="document.getElementById('loadingText').style.display='none'">
</iframe>

</body>
</html>
